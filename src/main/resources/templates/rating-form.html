<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Rating</title>
    <meta charset="UTF-8">
</head>
<body>

    <h1>Add Rating</h1>

    <div th:if="${movie != null}">
        <h2 th:text="${movie.title}">Movie Title</h2>
    </div>

    <form th:action="@{/ratings/create}" th:object="${rating}" method="post">
        <input type="hidden" name="imdbId" th:value="${movie.imdbID}" />

        <div>
            <label for="ratingValue">Rating (1-10):</label>
            <input type="number" id="ratingValue" th:field="*{ratingValue}" min="1" max="10">
        </div>

        <br>

        <button type="submit">Save rating</button>
    </form>

    <br>
    <a href="/movies">Back to movies</a>

</body>
</html>
