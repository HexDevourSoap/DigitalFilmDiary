<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:attr="lang=${appLang},data-app-lang=${appLang}">

<head>
    <title th:text="${movieDisplayTitle}">Movie</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/style.css}">
    <th:block th:replace="~{fragments/site-chrome :: i18nScripts}"></th:block>
    <script th:src="@{/theme.js}" defer></script>
    <script th:src="@{/plot-translate.js}" defer></script>
</head>
<body>

<h1 class="page-title">
    <span th:text="${movieDisplayTitle}">Movie title</span>
</h1>
<header th:replace="~{fragments/site-chrome :: siteHeader}"></header>
<hr>

<div class="details-container movie-details-layout">

    <div class="movie-details-poster">
        <img th:if="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
             th:src="${movie.posterUrl}"
             th:alt="${movieDisplayTitle}"
             class="poster poster--large"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">

        <div th:if="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
             class="no-poster no-poster--large"
             style="display:none;"
             data-i18n="home.noPoster">
            No poster
        </div>

        <div th:if="${movie.posterUrl == null or #strings.isEmpty(movie.posterUrl)}"
             class="no-poster no-poster--large"
             data-i18n="home.noPoster">
            No poster
        </div>
    </div>

    <div class="details-text movie-details-meta">
        <p th:if="${movie.releaseYear != null}">
            <strong data-i18n="movie.year">Year:</strong>
            <span th:text="${movie.releaseYear}">—</span>
        </p>

        <p th:if="${movie.runtimeMin != null}">
            <strong data-i18n="movie.runtime">Runtime:</strong>
            <span th:text="${movie.runtimeMin}">—</span>
            <span data-i18n="movie.minutes">min</span>
        </p>

        <p th:if="${movie.imdbRating != null}">
            <strong data-i18n="movie.imdbRating">IMDb rating:</strong>
            <span th:text="${movie.imdbRating}">—</span>
        </p>

        <div th:if="${movie.genres != null and !#lists.isEmpty(movie.genres)}">
            <strong data-i18n="movie.genres">Genres:</strong>
            <ul class="genre-list">
                <li th:each="g : ${movie.genres}"
                    class="genre-translate"
                    th:attr="data-en=${g.name}"
                    th:text="${g.name}">Genre</li>
            </ul>
        </div>

        <div th:if="${movie.description != null and !#strings.isEmpty(movie.description)}">
            <h2 class="section-title movie-plot-heading" style="margin-top: 16px;" data-i18n="movie.plot">Plot</h2>
            <p id="movie-plot-text" th:text="${moviePlotText != null ? moviePlotText : movie.description}">Description</p>
        </div>

        <div class="movie-details-actions">
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{|${langPrefix}/diary/create/${movie.imdbId}|}" class="action-button" data-i18n="movie.addToDiary">
                    Add to diary
                </a>
            </span>
            <span sec:authorize="isAnonymous()">
                <a th:href="@{|${langPrefix}/login|}" class="action-button secondary-button" data-i18n="movie.loginToAdd">
                    Log in to add
                </a>
            </span>
        </div>
    </div>
</div>

<div class="back-links">
    <a th:href="@{|${langPrefix}/movies|}" data-i18n="movie.backMovies">Back to movies</a>
    <a th:href="@{|${langPrefix}/|}" data-i18n="movie.backHome">Home</a>
</div>

</body>
</html>
