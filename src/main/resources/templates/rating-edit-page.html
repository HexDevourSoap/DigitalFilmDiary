<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="lang=${appLang},data-app-lang=${appLang}">
<head>
    <title>Edit Rating</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/style.css}">
    <th:block th:replace="~{fragments/site-chrome :: i18nScripts}"></th:block>
    <script th:src="@{/theme.js}" defer></script>
</head>
<body>

<h1 class="page-title" data-i18n="editRating.title">Edit Rating</h1>
<header th:replace="~{fragments/site-chrome :: siteHeader}"></header>

<hr>

<div class="details-container">

    <div th:if="${movie != null}">
        <h2 th:text="${movie.title}">Movie Title</h2>
    </div>

    <form th:action="@{|${langPrefix}/ratings/update/${rating.ratingId}|}" th:object="${rating}" method="post">

        <input type="hidden" th:field="*{imdbId}" />

        <div class="form-group">
            <label for="ratingValue" data-i18n="formRating.rating">Rating (1-10):</label><br>
            <input type="number" id="ratingValue" th:field="*{ratingValue}" min="1" max="10" class="form-input">
        </div>

        <button type="submit" class="search-button" data-i18n="editRating.update">Update rating</button>
    </form>

</div>

<div class="back-links">
    <a th:href="@{|${langPrefix}/diary|}" data-i18n="editRating.backDiary">Back to diary</a>
</div>

</body>
</html>
