<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="lang=${appLang},data-app-lang=${appLang}">
<head>
    <title>My Diary</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/style.css}">
    <th:block th:replace="~{fragments/site-chrome :: i18nScripts}"></th:block>
    <script th:src="@{/plot-translate.js}" defer></script>
    <script th:src="@{/theme.js}" defer></script>
</head>
<body>

<h1 class="page-title" data-i18n="diaryPage.title">My Movie Diary</h1>
<header th:replace="~{fragments/site-chrome :: siteHeader}"></header>

<hr>

<div class="diary-section">
    <h2 class="section-title" data-i18n="diaryPage.sectionSaved">Saved / Planned / Watching</h2>
    <div th:if="${diaryEntries == null or #lists.isEmpty(diaryEntries)}">
        <p data-i18n="diaryPage.emptyEntries">No diary entries yet.</p>
    </div>

    <div th:each="entry : ${diaryEntries}">
        <hr>

        <h3 class="movie-title-translate"
            th:attr="data-en=${movieMap[entry.imdbId] != null ? movieMap[entry.imdbId].title : entry.imdbId}"
            th:text="${movieMap[entry.imdbId] != null ? movieMap[entry.imdbId].title : entry.imdbId}">
            Movie Title
        </h3>

        <img th:if="${movieMap[entry.imdbId] != null and movieMap[entry.imdbId].poster != null and !#strings.isEmpty(movieMap[entry.imdbId].poster) and movieMap[entry.imdbId].poster != 'N/A'}"
             th:src="${movieMap[entry.imdbId].poster}"
             data-i18n-alt="home.posterAlt"
             alt="Poster"
             class="poster">

        <p><span data-i18n="diaryPage.status">Status:</span> <span th:text="${entry.status}">WATCHED</span></p>

        <p th:if="${entry.plannedDate != null}">
            <span data-i18n="diaryPage.plannedDate">Planned date:</span> <span th:text="${entry.plannedDate}">2026-03-20</span>
        </p>

        <p th:if="${entry.notes != null and !#strings.isEmpty(entry.notes)}">
            <span data-i18n="diaryPage.notes">Notes:</span> <span th:text="${entry.notes}">My thoughts</span>
        </p>

        <p th:if="${ratingMap[entry.imdbId] != null}">
            <span data-i18n="diaryPage.yourRating">Your rating:</span> <span th:text="${ratingMap[entry.imdbId].ratingValue}">8</span>/10
        </p>

        <p th:if="${ratingMap[entry.imdbId] == null}">
            <span data-i18n="diaryPage.yourRating">Your rating:</span> <span data-i18n="diaryPage.notRated">not rated yet</span>
        </p>

        <div class="button-group">
            <a th:href="@{|${langPrefix}/diary/update/${entry.userMovieId}|}" class="action-button" data-i18n="diaryPage.edit">Edit</a>
            <a th:href="@{|${langPrefix}/diary/delete/${entry.userMovieId}|}" class="action-button secondary-button" data-i18n="diaryPage.delete">Delete</a>
        </div>
    </div>
</div>

<div class="back-links">
    <a th:href="@{|${langPrefix}/|}" data-i18n="diaryPage.backHome">Back to home</a>
    <a th:href="@{|${langPrefix}/movies|}" data-i18n="diaryPage.backMovies">Browse movies</a>
</div>

</body>
</html>
