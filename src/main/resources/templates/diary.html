<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Diary</title>
</head>
<body>

<h1>My Movie Diary</h1>

<div th:each="entry : ${diary}">
    <h3 th:text="${entry.movie.title}"></h3>

    <p>Status: <span th:text="${entry.status}"></span></p>

    <p th:if="${entry.plannedDate != null}">
        Planned: <span th:text="${entry.plannedDate}"></span>
    </p>

</div>

</body>
</html>
