<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:fragment="i18nScripts">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.11.5/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2.5.2/i18nextHttpBackend.min.js"></script>
    <script th:inline="javascript">
        window.__APP_ROOT__ = /*[[@{/}]]*/ "/";
    </script>
    <script th:src="@{/i18n-boot.js(v=20260419)}" defer></script>
</th:block>

<header th:fragment="siteHeader" class="site-header hud-shell">
    <a class="site-brand" th:href="@{|${langPrefix}/|}">
        <span class="site-brand__badge" aria-hidden="true">F</span>
        <span class="site-brand__name" data-i18n="app.title">Movie Diary</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primary-nav">
        <span class="nav-toggle__line" aria-hidden="true"></span>
        <span class="nav-toggle__line" aria-hidden="true"></span>
        <span class="nav-toggle__line" aria-hidden="true"></span>
    </button>
    <nav class="site-nav" id="primary-nav" aria-label="Primary navigation">
        <div class="nav-cluster">
            <a class="nav-btn" th:href="@{|${langPrefix}/|}" data-i18n="nav.home">Home</a>
            <a class="nav-btn" th:href="@{|${langPrefix}/movies|}" data-i18n="nav.movies">Browse movies</a>
            <a class="nav-btn" th:href="@{|${langPrefix}/diary|}" data-i18n="nav.diary">My diary</a>
            <a class="nav-btn" th:href="@{|${langPrefix}/recommendations|}" data-i18n="nav.recommendations">Recommendations</a>
        </div>

        <div class="nav-cluster nav-cluster--user">
            <span sec:authorize="isAnonymous()">
                <a class="nav-btn nav-btn--ghost" th:href="@{|${langPrefix}/register|}" data-i18n="nav.register">Register</a>
                <a class="nav-btn nav-btn--accent" th:href="@{|${langPrefix}/login|}" data-i18n="nav.login">Login</a>
            </span>

            <span sec:authorize="isAuthenticated()" class="nav-user-block">
                <span class="nav-user-chip">
                    <span class="nav-user-label" data-i18n="nav.loggedInAs">Logged in as:</span>
                    <b class="nav-user-name" sec:authentication="name">user</b>
                </span>
                <form th:action="@{/logout}" method="post" class="inline-form nav-logout-form">
                    <button type="submit" class="nav-btn nav-btn--ghost logout-button" data-i18n="nav.logout">Logout</button>
                </form>
            </span>
        </div>
    </nav>

    <div class="hud-bar-actions">
        <div class="lang-switch" role="group" aria-label="Language">
            <a th:href="${langUrlLv}" class="lang-link" th:classappend="${appLang == 'lv'} ? 'is-active'">LV</a>
            <a th:href="${langUrlEn}" class="lang-link" th:classappend="${appLang == 'en'} ? 'is-active'">EN</a>
        </div>
        <button id="theme-toggle" class="theme-button hud-theme-btn theme-toggle-btn" type="button"
                aria-pressed="false"
                title="Dark mode">
            <span class="theme-toggle__moon" aria-hidden="true">🌙</span>
            <span class="theme-toggle__sun" aria-hidden="true">☀️</span>
        </button>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const mobileWidth = 768;
            document.querySelectorAll(".site-header").forEach(function (header) {
                if (header.dataset.menuInit === "true") {
                    return;
                }
                header.dataset.menuInit = "true";

                const toggleButton = header.querySelector(".nav-toggle");
                if (!toggleButton) {
                    return;
                }

                function closeMenu() {
                    header.classList.remove("menu-open");
                    toggleButton.setAttribute("aria-expanded", "false");
                }

                toggleButton.addEventListener("click", function () {
                    const isOpen = header.classList.toggle("menu-open");
                    toggleButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
                });

                header.querySelectorAll(".site-nav a, .site-nav button[type='submit'], .hud-bar-actions a, .hud-bar-actions button").forEach(function (interactiveItem) {
                    interactiveItem.addEventListener("click", function () {
                        if (window.innerWidth <= mobileWidth) {
                            closeMenu();
                        }
                    });
                });

                window.addEventListener("resize", function () {
                    if (window.innerWidth > mobileWidth) {
                        closeMenu();
                    }
                });
            });
        });
    </script>
</header>

</body>
</html>
